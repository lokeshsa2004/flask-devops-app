<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}StackForge Showcase{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <strong>StackForge</strong>
      <span class="tagline">Full-stack DevOps demo</span>
    </div>
    <nav class="actions">
      <button type="button" id="theme-toggle" class="btn" aria-pressed="false">Theme</button>
      <span id="health-pill" class="pill pill-muted" title="DB health from /api/health">Checking…</span>
    </nav>
  </header>
  <main class="wrap">
    {% block body %}{% endblock %}
  </main>
  <footer class="footer">
    <p>Flask · MySQL · Nginx · Gunicorn · Docker Compose</p>
  </footer>
  <script src="{{ url_for('static', filename='js/site.js') }}" defer></script>
</body>
</html>
