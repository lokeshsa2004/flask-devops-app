services:
  flask-app:
    image: ${APP_IMAGE:-ghcr.io/lokeshsa2004/flask-devops-app:latest}
    container_name: flask-app
    restart: unless-stopped
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app
