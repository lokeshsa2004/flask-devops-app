version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: stackforge-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: stackforge
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - app-network

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-flask-devops-app:local}
    container_name: flask-app
    restart: unless-stopped
    entrypoint: ["/app/docker/entrypoint.sh"]
    expose:
      - "8000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: mysql+pymysql://app:app@db:3306/stackforge
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request as u; r=u.urlopen('http://127.0.0.1:8000/api/health'); assert r.getcode()==200",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      flask-app:
        condition: service_healthy
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
