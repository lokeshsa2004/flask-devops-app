name: Flask App CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stackforge_ci
          MYSQL_USER: app
          MYSQL_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=20

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    env:
      DATABASE_URL: mysql+pymysql://app:app@127.0.0.1:3306/stackforge_ci
      FLASK_APP: app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Wait for MySQL
        run: |
          python docker/wait_for_mysql.py

      - name: Initialize database
        run: |
          flask init-db

      - name: Run Pytest Tests
        run: |
          pytest tests/test_app.py -v --tb=short

      - name: Generate Coverage Report
        run: |
          pytest tests/test_app.py --cov=. --cov-report=xml --cov-report=html

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            htmlcov/
            .coverage
            coverage.xml
          retention-days: 30

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check Code Style with Black
        run: |
          black --check .

      - name: Check Import Sorting with isort
        run: |
          isort --check-only .

      - name: Lint with Flake8
        run: |
          flake8 app.py showcase tests --max-line-length=100 --ignore=E501,W503 > flake8-report.txt || true

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: flake8-report.txt
          retention-days: 30

  docker:
    name: Build & Push Docker Image (GHCR)
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to EC2 (Docker)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Verify Deployment Readiness
        run: |
          echo "Checking deployment configuration..."
          [ -f config/nginx/flask_app ] && echo "Nginx config: OK"
          [ -f config/systemd/flask_app.service ] && echo "Systemd config: OK"

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -euo pipefail

          REPO_URL="https://github.com/${{ github.repository }}.git"
          APP_IMAGE="ghcr.io/${{ github.repository }}:latest"

          echo "Ensuring Docker is installed..."
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y docker.io docker-compose-plugin git
            sudo systemctl enable --now docker
          fi

          echo "Logging into GHCR (optional: only needed for private images)..."
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          else
            echo "GHCR_TOKEN secret not set. If the GHCR image is private, pulls will fail."
          fi

          echo "Ensuring compose files exist on VM..."
          if [ ! -d "$HOME/flask-devops-app/.git" ]; then
            git clone "$REPO_URL" "$HOME/flask-devops-app"
          fi
          cd "$HOME/flask-devops-app"
          git fetch origin master
          git reset --hard origin/master

          echo "Pulling latest images..."
          sudo APP_IMAGE="$APP_IMAGE" docker compose pull

          echo "Starting stack (db -> app -> nginx)..."
          sudo APP_IMAGE="$APP_IMAGE" docker compose up -d --remove-orphans

          echo "Health check..."
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1/ >/dev/null; then
              echo "✓ App is responding on port 80"
              exit 0
            fi
            sleep 1
          done

          echo "✗ App did not become healthy in time"
          sudo docker compose logs --tail=200 || true
          exit 1

          EOF

      - name: Post Deployment Health Check
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "Running health checks..."

          # Check containers are running
          sudo docker ps --filter "name=nginx" --format '{{.Names}}' | grep -q nginx \
            && echo "✓ Nginx container is running" || echo "✗ Nginx container is NOT running"
          sudo docker ps --filter "name=flask-app" --format '{{.Names}}' | grep -q flask-app \
            && echo "✓ App container is running" || echo "✗ App container is NOT running"
          sudo docker ps --filter "name=stackforge-db" --format '{{.Names}}' | grep -q stackforge-db \
            && echo "✓ MySQL container is running" || echo "✗ MySQL container is NOT running"

          # Check app endpoint via port 80
          response=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/)
          [ "$response" = "200" ] && echo "✓ App endpoint returns 200" || echo "✗ App endpoint returned $response"

          EOF

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [test, lint, docker, deploy]

    steps:
      - name: Deployment Status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.lint.result }}" == "success" ]]; then
            echo "✅ All checks passed"
          else
            echo "❌ Some checks failed"
          fi