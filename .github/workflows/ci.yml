name: Flask App CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      - name: Run Pytest Tests
        run: |
          pytest tests/test_app.py -v --tb=short

      - name: Generate Coverage Report
        run: |
          pip install pytest-cov
          pytest tests/test_app.py --cov=. --cov-report=xml --cov-report=html

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            htmlcov/
            .coverage
            coverage.xml
          retention-days: 30

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check Code Style with Black
        run: |
          black --check . || echo "Note: Some files need formatting"

      - name: Check Import Sorting with isort
        run: |
          isort --check-only . || echo "Note: Some imports need sorting"

      - name: Lint with Flake8
        run: |
          flake8 app.py tests/ --max-line-length=100 --ignore=E501,W503 > flake8-report.txt || true

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: lint-reports
          path: flake8-report.txt
          retention-days: 30

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Verify Deployment Readiness
        run: |
          echo "Checking deployment configuration..."
          [ -f config/nginx/flask_app ] && echo "Nginx config: OK"
          [ -f config/systemd/flask_app.service ] && echo "Systemd config: OK"

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          cd ~/flask_app

          echo "Pulling latest code from master branch..."
          git pull origin master

          echo "Activating virtual environment and installing dependencies..."
          source venv/bin/activate
          pip install -r requirements.txt

          echo "Restarting Flask app with systemd..."
          sudo systemctl restart flask_app

          echo "Verifying app status..."
          sleep 2
          sudo systemctl status flask_app

          echo "Testing app accessibility..."
          curl -s http://127.0.0.1:8000/ | head -n 5

          echo "Deployment completed successfully"

          EOF

      - name: Post Deployment Health Check
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "Running health checks..."

          # Check if Gunicorn is running
          pgrep -f gunicorn > /dev/null && echo "✓ Gunicorn is running" || echo "✗ Gunicorn is NOT running"

          # Check if Nginx is running
          sudo systemctl status nginx > /dev/null 2>&1 && echo "✓ Nginx is running" || echo "✗ Nginx is NOT running"

          # Check app endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/)
          [ "$response" = "200" ] && echo "✓ App endpoint returns 200" || echo "✗ App endpoint returned $response"

          EOF

      - name: Upload Deployment Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: deployment-logs-${{ github.run_id }}
          path: .
          retention-days: 30

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [test, lint, deploy]

    steps:
      - name: Deployment Status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.lint.result }}" == "success" ]]; then
            echo "✅ All checks passed"
          else
            echo "❌ Some checks failed"
          fi