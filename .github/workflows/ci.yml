name: Flask App CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      - name: Run Pytest Tests
        run: |
          pytest tests/test_app.py -v --tb=short

      - name: Generate Coverage Report
        run: |
          pip install pytest-cov
          pytest tests/test_app.py --cov=. --cov-report=xml --cov-report=html

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            htmlcov/
            .coverage
            coverage.xml
          retention-days: 30

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check Code Style with Black
        run: |
          black --check . || echo "Note: Some files need formatting"

      - name: Check Import Sorting with isort
        run: |
          isort --check-only . || echo "Note: Some imports need sorting"

      - name: Lint with Flake8
        run: |
          flake8 app.py tests/ --max-line-length=100 --ignore=E501,W503 > flake8-report.txt || true

      - name: Upload Lint Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: flake8-report.txt
          retention-days: 30

  docker:
    name: Build & Push Docker Image (GHCR)
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to EC2 (Docker)
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Verify Deployment Readiness
        run: |
          echo "Checking deployment configuration..."
          [ -f config/nginx/flask_app ] && echo "Nginx config: OK"
          [ -f config/systemd/flask_app.service ] && echo "Systemd config: OK"

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -euo pipefail

          IMAGE="ghcr.io/${{ github.repository }}:latest"
          CONTAINER_NAME="flask-devops-app"

          echo "Ensuring Docker is installed..."
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt update
            sudo apt install -y docker.io
            sudo systemctl enable --now docker
          fi

          echo "Logging into GHCR (requires GHCR_PAT secret on GitHub)..."
          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "${{ secrets.GHCR_PAT }}" | sudo docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          else
            echo "GHCR_PAT secret is missing. If the GHCR image is private, pulls will fail."
          fi

          echo "Pulling latest image..."
          sudo docker pull "$IMAGE"

          echo "Replacing running container (if any)..."
          sudo docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

          echo "Starting container on port 80..."
          sudo docker run -d \
            --name "$CONTAINER_NAME" \
            --restart unless-stopped \
            -p 80:8000 \
            "$IMAGE"

          echo "Health check..."
          for i in {1..15}; do
            if curl -fsS http://127.0.0.1/ >/dev/null; then
              echo "✓ App is responding on port 80"
              exit 0
            fi
            sleep 1
          done

          echo "✗ App did not become healthy in time"
          sudo docker logs --tail=200 "$CONTAINER_NAME" || true
          exit 1

          EOF

      - name: Post Deployment Health Check
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "Running health checks..."

          # Check container is running
          sudo docker ps --filter "name=flask-devops-app" --format '{{.Names}}' | grep -q flask-devops-app \
            && echo "✓ Container is running" || echo "✗ Container is NOT running"

          # Check app endpoint via port 80
          response=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1/)
          [ "$response" = "200" ] && echo "✓ App endpoint returns 200" || echo "✗ App endpoint returned $response"

          EOF

      - name: Upload Deployment Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-logs-${{ github.run_id }}
          path: .
          retention-days: 30

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    if: always()
    needs: [test, lint, docker, deploy]

    steps:
      - name: Deployment Status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.lint.result }}" == "success" ]]; then
            echo "✅ All checks passed"
          else
            echo "❌ Some checks failed"
          fi